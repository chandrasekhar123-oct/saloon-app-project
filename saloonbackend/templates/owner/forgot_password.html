<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saloon Essy | Account Recovery</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;950&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@21.0.8/build/css/intlTelInput.css">
    <style>
        :root {
            --primary-premium: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --text-dark: #0f172a;
            --text-slate: #64748b;
        }

        body {
            background: #f1f5f9;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
        }

        .recovery-card {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        .header-section {
            padding: 4rem 2rem;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1595152772835-219674b2a8a6?w=500&q=80') center/cover;
            opacity: 0.1;
        }

        .logo-box {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 1;
        }

        .logo-box i {
            font-size: 2rem;
            color: #1e293b;
        }

        .form-section {
            padding: 3rem 2.5rem;
            position: relative;
        }

        /* Subtle Background Logo (Watermark) */
        .form-bg-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15rem;
            color: rgba(99, 102, 241, 0.03);
            pointer-events: none;
            z-index: 0;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
            z-index: 1;
        }

        .input-wrapper i.prefix-icon {
            position: absolute;
            left: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-slate);
            transition: 0.3s;
            z-index: 10;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1.3rem 1.5rem 1.3rem 4rem;
            border: 2px solid #f1f5f9;
            border-radius: 20px;
            background: #f8fafc;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: 0.3s;
            box-sizing: border-box;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary-premium);
            background: white;
            box-shadow: 0 10px 25px -5px var(--primary-glow);
        }

        /* Phone Input Overrides */
        .iti {
            width: 100%;
            display: block;
        }

        .iti__country-list {
            border-radius: 20px;
            margin-top: 10px;
            border: none;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
            font-family: inherit;
        }

        .btn-submit {
            width: 100%;
            padding: 1.3rem;
            border-radius: 22px;
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            font-weight: 800;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 15px 35px -10px rgba(30, 41, 59, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .footer-link {
            display: block;
            margin-top: 2rem;
            text-align: center;
            color: var(--text-slate);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .footer-link:hover {
            color: var(--primary-premium);
        }

        .flash {
            background: #fff1f2;
            color: #be123c;
            padding: 1rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            border-left: 4px solid #be123c;
            position: relative;
            z-index: 1;
        }

        .fade-in {
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="recovery-card fade-in">
        <div class="header-section">
            <div class="logo-box"
                style="background: white; width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 1.5rem; overflow: hidden; padding: 8px;">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Saloon Essy"
                    style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            <h1 style="font-weight: 950; font-size: 2.2rem; letter-spacing: -2px; margin: 0;">Saloon Essy</h1>
            <p
                style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 3px; font-weight: 700; opacity: 0.7; margin-top: 0.5rem;">
                Partner Recovery</p>
        </div>

        <div class="form-section">
            <div class="form-bg-logo">
                <img src="{{ url_for('static', filename='images/logo.png') }}"
                    style="width: 100%; opacity: 0.04; filter: grayscale(1);">
            </div>

            <div style="margin-bottom: 2.5rem; position: relative; z-index: 1;">
                <h2 style="font-weight: 800; color: var(--text-dark); margin: 0; font-size: 1.5rem;">Reset Password</h2>
                <p style="color: var(--text-slate); font-weight: 500; margin-top: 0.4rem;">Verify your identity to
                    regain access.</p>
            </div>

            {% with messages = get_flashed_messages() %}
            {% if messages %}
            {% for message in messages %}
            <div class="flash fade-in">
                <i class="fas fa-exclamation-circle" style="margin-right: 8px;"></i> {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('owner.forgot_password') }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="input-wrapper">
                    <i class="fas fa-envelope prefix-icon"></i>
                    <input type="email" name="email" placeholder="Business Email" required>
                </div>

                <div class="input-wrapper" style="margin-bottom: 2.5rem;">
                    <input type="tel" id="phone" name="raw_phone" placeholder="Phone Number" required
                        style="padding-left: 95px !important;">
                    <input type="hidden" name="phone" id="full_phone">
                </div>

                <button type="submit" class="btn-submit">Verify Account</button>
            </form>

            <a href="{{ url_for('owner.login') }}" class="footer-link">← Back to Portal Access</a>

            <div
                style="margin-top: 2.5rem; display: flex; align-items: center; justify-content: center; gap: 8px; color: #10b981; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;">
                <i class="fas fa-lock"></i> Secured Account Recovery
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@21.0.8/build/js/intlTelInput.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const input = document.querySelector("#phone");
            const hiddenInput = document.querySelector("#full_phone");

            const iti = window.intlTelInput(input, {
                initialCountry: "auto",
                geoIpLookup: callback => {
                    fetch("https://ipapi.co/json")
                        .then(res => res.json())
                        .then(data => callback(data.country_code))
                        .catch(() => callback("in"));
                },
                utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@21.0.8/build/js/utils.js",
                separateDialCode: true,
            });

            const form = document.querySelector("form");
            form.addEventListener("submit", function () {
                hiddenInput.value = iti.getNumber();
            });
        });
    </script>
</body>

</html>
