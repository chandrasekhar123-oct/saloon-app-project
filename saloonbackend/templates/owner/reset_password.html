<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Salon Owner</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            /* Success green for the final step */
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-main: #f8fafc;
        }

        body {
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: #ecfdf5;
            color: var(--primary);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1.5rem;
        }

        h2 {
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid #f1f5f9;
            border-radius: 15px;
            background: #f8fafc;
            font-family: inherit;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
        }

        .btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2);
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(16, 185, 129, 0.3);
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #f1f5f9;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-box">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h2>Reset Password</h2>
        <div class="user-badge">
            <i class="fas fa-user-circle"></i> {{ owner.name }}
        </div>
        <p>Verification successful! Please create a strong new password for your account.</p>

        <form action="{{ url_for('owner.reset_password', owner_id=owner.id) }}" method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Enter New Password" required minlength="6">
            </div>
            <div class="input-group">
                <i class="fas fa-check-double"></i>
                <input type="password" placeholder="Confirm New Password" required oninput="
                    if(this.value != this.form.password.value) this.setCustomValidity('Passwords do not match');
                    else this.setCustomValidity('');
                ">
            </div>
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>
</body>

</html>
