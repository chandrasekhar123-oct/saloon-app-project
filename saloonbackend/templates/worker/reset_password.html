<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Portal | Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #134e4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: white;
            border-radius: 28px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            margin: 0 auto 1.5rem;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 900;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .user-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #f1f5f9;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 1.5rem;
        }

        p.sub {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 700;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #10b981;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 0.5rem;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .flash {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            text-align: left;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-box">
            <i class="fas fa-shield-alt"></i>
        </div>
        <h1>Reset Password</h1>
        <div class="user-badge">
            <i class="fas fa-user-circle"></i> {{ worker.name }}
        </div>
        <p class="sub">Verify success! Please create a new secure password.</p>

        <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" name="password" placeholder="Min. 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Repeat new password" required oninput="
                    if(this.value != this.form.password.value) this.setCustomValidity('Passwords do not match');
                    else this.setCustomValidity('');
                ">
            </div>
            <button type="submit" class="btn">Update Password</button>
        </form>
    </div>
</body>

</html>
