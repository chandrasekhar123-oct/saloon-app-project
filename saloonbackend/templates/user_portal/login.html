<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saloon Essy | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@21.0.8/build/css/intlTelInput.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1131 0%, #7c1c3e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 2.5rem 2rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f43f5e, #fb923c);
            border-radius: 24px;
            margin: 0 auto 1rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 0 8px 24px rgba(244, 63, 94, 0.4);
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 900;
            color: #0f172a;
        }

        p.sub {
            color: #64748b;
            font-size: 0.88rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 1.1rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 800;
            color: #374151;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #f43f5e;
        }

        .iti {
            width: 100%;
            display: block;
        }
    .iti input {
        padding-left: 95px !important;
    }


        .iti__country-list {
            border-radius: 14px;
            border: 2px solid #e5e7eb;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            font-family: 'Outfit', sans-serif;
        }

        .iti__flag {
            border-radius: 2px;
        }

        .btn {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, #f43f5e, #fb923c);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .link-row {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: #64748b;
        }

        .link-row a {
            color: #f43f5e;
            font-weight: 700;
            text-decoration: none;
        }

        .flash {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .flash.danger {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .flash.success {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 0.75rem;
            color: #94a3b8;
            font-size: 0.82rem;
            text-decoration: none;
        }

        .back-link:hover {
            color: #f43f5e;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-cut"></i></div>
            <h1>Welcome Back</h1>
            <p class="sub">Sign in to book your next grooming session</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" name="raw_phone" placeholder="Enter mobile number" required autofocus>
                <input type="hidden" name="phone" id="full_phone">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <button type="submit" class="btn"><i class="fas fa-sign-in-alt"
                    style="margin-right: 8px;"></i>Login</button>
        </form>

        <div class="link-row">
            <p>New here? <a href="{{ url_for('user_portal.register') }}">Create an Account →</a></p>
        </div>
        <a href="/" class="back-link">← Back to Gateway</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@21.0.8/build/js/intlTelInput.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const input = document.querySelector("#phone");
            const hiddenInput = document.querySelector("#full_phone");

            const iti = window.intlTelInput(input, {
                initialCountry: "auto",
                geoIpLookup: callback => {
                    fetch("https://ipapi.co/json")
                        .then(res => res.json())
                        .then(data => callback(data.country_code))
                        .catch(() => callback("in"));
                },
                utilsScript: "https://cdn.jsdelivr.net/npm/intl-tel-input@21.0.8/build/js/utils.js",
                separateDialCode: true,
            });

            const form = document.querySelector("form");
            form.addEventListener("submit", function () {
                hiddenInput.value = iti.getNumber();
            });
        });
    </script>
</body>

</html>
