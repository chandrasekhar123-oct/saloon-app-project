<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Service | Saloon Essy</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8fafc;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 90%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        p {
            color: #64748b;
            margin-bottom: 2rem;
        }

        .stars {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .stars i {
            font-size: 2.5rem;
            color: #cbd5e1;
            cursor: pointer;
            transition: color 0.2s;
        }

        .stars i.active {
            color: #fbbf24;
        }

        textarea {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            border: 1px solid #e2e8f0;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            resize: none;
            height: 120px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        .back-link {
            display: block;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>How was your service?</h1>
        <p>At {{ booking.salon.name if booking.salon else 'Deleted Salon' }}</p>

        <form method="POST">
            <input type="hidden" name="rating" id="rating-val" value="5">
            <div class="stars">
                <i class="fas fa-star active" data-val="1"></i>
                <i class="fas fa-star active" data-val="2"></i>
                <i class="fas fa-star active" data-val="3"></i>
                <i class="fas fa-star active" data-val="4"></i>
                <i class="fas fa-star active" data-val="5"></i>
            </div>

            <textarea name="comment" placeholder="Write your experience here..." required></textarea>

            <button type="submit" class="submit-btn">Submit Feedback</button>
        </form>

        <a href="{{ url_for('user_portal.my_bookings') }}" class="back-link">May be later</a>
    </div>

    <script>
        const stars = document.querySelectorAll('.stars i');
        const ratingInput = document.getElementById('rating-val');

        stars.forEach(star => {
            star.addEventListener('click', () => {
                const val = star.getAttribute('data-val');
                ratingInput.value = val;

                stars.forEach(s => {
                    if (s.getAttribute('data-val') <= val) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
            });
        });
    </script>
</body>

</html>
