<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --accent: #8b5cf6;
            --bg: #0f172a;
            --glass: rgba(30, 41, 59, 0.7);
        }

        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Animated background particles */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: -1;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(50%, 50%); }
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 3.5rem 2.5rem;
            border-radius: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            position: relative;
        }

        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 2rem;
        }

        .logo-wrap img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: white;
            padding: 4px;
            object-fit: cover;
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.3);
        }

        .logo-wrap::after {
            content: 'SUPER';
            position: absolute;
            bottom: -5px;
            right: -20px;
            background: var(--primary);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 50px;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group i {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            transition: color 0.3s;
        }

        input {
            width: 100%;
            padding: 1.1rem 1.1rem 1.1rem 3.5rem;
            border-radius: 1rem;
            border: 1px solid #334155;
            background: rgba(15, 23, 42, 0.5);
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        input:focus + i {
            color: var(--primary);
        }

        .toggle-password {
            position: absolute;
            right: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #475569;
            z-index: 10;
            padding: 8px;
            transition: 0.2s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            margin-top: 1rem;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(99, 102, 241, 0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .alert {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            padding: 0.75rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    
    <div class="login-card">
        <div class="logo-wrap">
            <img src="{{ url_for('static', filename='images/logo.png', v=3) }}" alt="Saloon Essy">
        </div>
        <h1>Admin Control</h1>
        <p class="subtitle">Secure authentication portal</p>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        {% for msg in messages %}
        <div class="alert">
            <i class="fas fa-exclamation-circle"></i>
            {{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
            <div class="input-group">
                <input type="text" name="username" placeholder="Admin Username" required autocomplete="off">
                <i class="fas fa-user-shield"></i>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="passwordField" placeholder="Access Password" required>
                <i class="fas fa-lock"></i>
                <i class="fas fa-eye-slash toggle-password" id="togglePass"></i>
            </div>
            <button type="submit">Unlock Dashboard <i class="fas fa-chevron-right" style="font-size: 0.8rem; margin-left: 5px;"></i></button>
        </form>

        <div class="footer">
            &copy; 2026 Saloon Essy Infrastructure
        </div>
    </div>
    <script>
        document.getElementById('togglePass').addEventListener('click', function() {
            const passwordField = document.getElementById('passwordField');
            const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordField.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });
    </script>
</body>

</html>
